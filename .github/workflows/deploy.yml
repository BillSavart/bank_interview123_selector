name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: read
  packages: write # push images to ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.meta.outputs.owner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_ADSENSE_CLIENT=${{ vars.ADSENSE_CLIENT }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/bank-interview-web:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/bank-interview-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/bank-interview
            docker compose pull
            docker compose up -d
            docker image prune -f
