name: CI

# Fast checks for pull requests. Pushes to main are gated by the `checks` job in
# deploy.yml (which `build` → `deploy` depend on), so we only run here on PRs to
# avoid duplicate runs. Never pulls the Google Sheet or touches the VM — just
# typecheck, unit tests, and validation of the committed banks-data.json.
on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci || npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Validate committed banks-data.json
        run: npm run check:banks-data
