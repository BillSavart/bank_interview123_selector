# Runs on the GCP VM. Pulls pre-built images from ghcr — never builds here.
#
# Needs an .env alongside this file (compose variable substitution):
#   REGISTRY=ghcr.io/your-github-username
#   DOMAIN=interview.example.com
#   ADMIN_DOMAIN=admin.interview.example.com   # admin subdomain (add DNS record)
#   ADMIN_TOKEN=a-long-random-secret           # gates the calendar admin API
#   ADMIN_BASIC_HASH=                          # optional Caddy basic_auth bcrypt hash

services:
  api:
    image: ${REGISTRY}/bank-interview-api:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      PORT: "3000"
      RATINGS_FILE: /data/ratings.json
      COMMENTS_FILE: /data/comments.jsonl
      COMMENT_VOTES_FILE: /data/comment-votes.jsonl
      COMMENT_MOD_FILE: /data/comment-mods.jsonl
      POST_COMMENTS_FILE: /data/post-comments.jsonl
      POST_COMMENT_VOTES_FILE: /data/post-comment-votes.jsonl
      POST_COMMENT_MOD_FILE: /data/post-comment-mods.jsonl
      CHECKGAME_FILE: /data/checkgame-top.json
      NUMBERGAME_FILE: /data/numbergame-top.json
      CALENDAR_FILE: /data/calendar.json
      POSTS_FILE: /data/posts.json
      POST_VOTES_FILE: /data/post-votes.jsonl
      SITE_BASE: ${SITE_BASE:-https://bank-interview-advisor.com}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      COMMENT_HIDE_SCORE: "-100"
      MAX_QUESTION_ID: "123"
    volumes:
      - ratings_data:/data
    mem_limit: 80m

  web:
    image: ${REGISTRY}/bank-interview-web:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DOMAIN: ${DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.localhost}
      ADMIN_BASIC_HASH: ${ADMIN_BASIC_HASH:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data # persists Let's Encrypt certs across restarts
      - caddy_config:/config
      # Cloudflare Origin Certificate (15-yr). Place origin.pem + origin.key in
      # ./certs next to this file; Caddy serves them instead of doing ACME, so
      # cert renewal no longer needs inbound 80/443 — safe to firewall the origin
      # down to Cloudflare's IP ranges only. Requires Cloudflare SSL/TLS mode
      # "Full (strict)". For local HTTP-only testing (DOMAIN=:80) this mount is
      # harmless as long as the Caddyfile's `tls` lines aren't hit on :80.
      - ./certs:/certs:ro
    mem_limit: 96m
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
  ratings_data:
