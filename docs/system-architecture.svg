<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">公股銀行新手村系統架構圖</title>
  <desc id="desc">Shows the browser, Cloudflare, GCP e2-micro Docker Compose deployment, Node API, persistent Docker volumes, build-time data generation, and GitHub Actions deployment pipeline.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-amber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d97706"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="135%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; filter: url(#shadow); }
      .soft-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; }
      .soft-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; }
      .soft-amber { fill: #fffbeb; stroke: #fcd34d; stroke-width: 2; }
      .soft-rose { fill: #fff1f2; stroke: #fda4af; stroke-width: 2; }
      .soft-violet { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 2; }
      .soft-cyan { fill: #ecfeff; stroke: #67e8f9; stroke-width: 2; }
      .title { font: 800 42px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 500 18px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .h1 { font: 800 24px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .h2 { font: 800 19px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .body { font: 500 15px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif; fill: #334155; letter-spacing: 0; }
      .small { font: 500 13px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .mono { font: 600 13px Menlo, Consolas, monospace; fill: #1e293b; letter-spacing: 0; }
      .label { font: 800 13px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif; fill: #334155; letter-spacing: 0; }
      .arrow-blue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .arrow-green { stroke: #059669; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .arrow-amber { stroke: #d97706; stroke-width: 3; fill: none; marker-end: url(#arrow-amber); }
      .thin { stroke-width: 2.4; }
      .dash { stroke-dasharray: 8 7; }
      .pill { rx: 18; ry: 18; }
      .chip { font: 700 12px "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1120"/>
  <rect x="34" y="32" width="1532" height="1056" rx="26" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="70" y="88" class="title">公股銀行新手村 系統架構圖</text>
  <text x="70" y="121" class="subtitle">Vite React SPA + Caddy + Node HTTP API + Docker volume，部署在 GCP e2-micro，透過 Cloudflare 與 GitHub Actions 維運。</text>

  <rect x="58" y="162" width="300" height="226" rx="18" class="card"/>
  <text x="84" y="203" class="h1">使用者端 Browser</text>
  <rect x="84" y="222" width="244" height="34" rx="17" class="soft-blue"/>
  <text x="106" y="244" class="body">主網域：前台 SPA</text>
  <rect x="84" y="268" width="244" height="34" rx="17" class="soft-violet"/>
  <text x="106" y="290" class="body">admin 子網域：後台</text>
  <rect x="84" y="314" width="244" height="48" rx="16" class="soft-amber"/>
  <text x="106" y="336" class="body">localStorage</text>
  <text x="106" y="354" class="small">voterId、已投票、admin token</text>

  <rect x="424" y="148" width="358" height="254" rx="18" class="card"/>
  <text x="452" y="189" class="h1">Cloudflare</text>
  <text x="452" y="222" class="body">Proxied DNS / CDN / DDoS protection</text>
  <text x="452" y="249" class="body">邊緣 TLS，回源使用 Origin Certificate</text>
  <text x="452" y="276" class="body">公開 GET API 尊重</text>
  <text x="604" y="276" class="mono">s-maxage=10</text>
  <text x="452" y="303" class="body">GCP 防火牆只允許 Cloudflare IP</text>
  <rect x="452" y="332" width="288" height="38" rx="19" class="soft-cyan"/>
  <text x="475" y="356" class="body">隱藏 origin，降低 e2-micro 壓力</text>

  <rect x="190" y="462" width="832" height="452" rx="22" fill="#f8fafc" stroke="#94a3b8" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="224" y="508" class="h1">GCP e2-micro VM / Docker Compose</text>
  <text x="224" y="535" class="subtitle">VM 不 build image，只 pull GHCR image 後啟動容器。</text>

  <rect x="224" y="568" width="350" height="236" rx="18" class="soft-green"/>
  <text x="250" y="606" class="h2">web container</text>
  <text x="250" y="633" class="body">Caddy 2 + 靜態檔</text>
  <text x="250" y="659" class="mono">/srv</text>
  <text x="292" y="659" class="body">：React build output</text>
  <text x="250" y="687" class="body">主站與 admin 子網域共用 SPA</text>
  <text x="250" y="715" class="mono">/api/*</text>
  <text x="308" y="715" class="body">反向代理到</text>
  <text x="407" y="715" class="mono">api:3000</text>
  <text x="250" y="743" class="mono">/e/*</text>
  <text x="294" y="743" class="body">短網址與爬蟲 SEO 交給 API</text>
  <text x="250" y="771" class="body">靜態資產：題庫、答案、地圖、PDF、OG 圖</text>

  <rect x="632" y="568" width="350" height="236" rx="18" class="soft-blue"/>
  <text x="658" y="606" class="h2">api container</text>
  <text x="658" y="633" class="body">Node</text>
  <text x="706" y="633" class="mono">server/ratings-api.mjs</text>
  <text x="658" y="661" class="mono">/api/ratings</text>
  <text x="778" y="661" class="body">答案評分</text>
  <text x="658" y="688" class="mono">/api/comments</text>
  <text x="778" y="688" class="body">題目留言與投票</text>
  <text x="658" y="715" class="mono">/api/posts</text>
  <text x="754" y="715" class="body">經驗分享、文章投票</text>
  <text x="658" y="742" class="mono">/api/calendar</text>
  <text x="790" y="742" class="body">招考行事曆</text>
  <text x="658" y="769" class="mono">/api/*/leaderboard</text>
  <text x="824" y="769" class="body">小遊戲排行榜</text>

  <rect x="224" y="832" width="252" height="50" rx="16" class="soft-cyan"/>
  <text x="248" y="854" class="body">Caddy volumes</text>
  <text x="248" y="873" class="mono">caddy_data / caddy_config</text>

  <rect x="512" y="820" width="470" height="74" rx="18" class="soft-rose"/>
  <text x="540" y="847" class="h2">ratings_data Docker volume</text>
  <text x="540" y="872" class="small">ratings.json、comments.jsonl、comment-votes.jsonl、mods、posts.json、calendar.json、game top JSON</text>

  <rect x="1084" y="148" width="450" height="370" rx="18" class="card"/>
  <text x="1114" y="189" class="h1">GitHub Actions CI/CD</text>
  <rect x="1114" y="214" width="390" height="40" rx="20" class="soft-amber"/>
  <text x="1138" y="239" class="body">觸發：main push / daily cron / manual run</text>
  <text x="1114" y="285" class="body">1. typecheck、unit test、banks-data validation</text>
  <text x="1114" y="318" class="body">2. build web image：Dockerfile</text>
  <text x="1114" y="351" class="body">3. build api image：Dockerfile.api</text>
  <text x="1114" y="384" class="body">4. push images to GHCR</text>
  <text x="1114" y="417" class="body">5. SSH 到 VM：</text>
  <text x="1230" y="417" class="mono">docker compose pull/up</text>
  <rect x="1114" y="448" width="390" height="38" rx="19" class="soft-green"/>
  <text x="1138" y="472" class="body">e2-micro 不在機器上跑 Vite build</text>

  <rect x="1084" y="604" width="450" height="296" rx="18" class="card"/>
  <text x="1114" y="645" class="h1">Build-time Data Pipeline</text>
  <text x="1114" y="683" class="body">題庫 PDF + 語意標註 JSON</text>
  <text x="1114" y="708" class="mono">scripts/extract-questions.mjs</text>
  <text x="1114" y="734" class="body">產生</text>
  <text x="1162" y="734" class="mono">src/data/questions.generated.ts</text>
  <line x1="1114" y1="756" x2="1504" y2="756" stroke="#e2e8f0" stroke-width="2"/>
  <text x="1114" y="789" class="body">Google Sheet XLSX + g0v GeoJSON</text>
  <text x="1114" y="814" class="mono">scripts/build-banks-data.mjs</text>
  <text x="1114" y="840" class="body">產生</text>
  <text x="1162" y="840" class="mono">public/banks-data.json</text>
  <line x1="1114" y1="862" x2="1504" y2="862" stroke="#e2e8f0" stroke-width="2"/>
  <text x="1114" y="890" class="body">answer_bank.json 與預渲染頁面進入 SPA image</text>

  <rect x="80" y="960" width="1438" height="72" rx="20" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="110" y="990" class="h2">設計取捨</text>
  <text x="110" y="1018" class="body">不使用 Firebase / 外部 DB / LLM runtime。互動資料留在 VM 的 Docker volume；公開讀取靠 Cloudflare edge cache，寫入與 admin API 直接打 origin。</text>

  <path d="M358 275 C385 275 394 275 424 275" class="arrow-blue"/>
  <text x="372" y="255" class="label">HTTPS</text>
  <path d="M604 402 C604 424 604 438 604 462" class="arrow-blue"/>
  <text x="625" y="434" class="label">80/443 回源</text>
  <path d="M574 686 C596 686 608 686 632 686" class="arrow-green"/>
  <text x="584" y="670" class="label">reverse_proxy</text>
  <path d="M806 804 C806 812 806 813 806 820" class="arrow-green thin"/>
  <text x="825" y="814" class="label">read/write</text>
  <path d="M1308 518 C1308 548 1308 552 1308 604" class="arrow-amber"/>
  <text x="1328" y="568" class="label">build inputs</text>
  <path d="M1084 340 C1046 340 1036 340 1000 340 C974 340 974 462 944 462" class="arrow-amber dash"/>
  <text x="958" y="322" class="label">pull images / restart</text>
  <path d="M1084 742 C1040 742 1026 742 982 742" class="arrow-amber dash"/>
  <text x="1000" y="724" class="label">baked into SPA</text>

  <rect x="790" y="204" width="190" height="118" rx="18" class="soft-violet"/>
  <text x="818" y="238" class="h2">Admin Boundary</text>
  <text x="818" y="267" class="body">UI：admin 子網域</text>
  <text x="818" y="294" class="body">API：Bearer ADMIN_TOKEN</text>
  <path d="M980 263 C1018 263 1038 263 1084 263" class="arrow-blue dash"/>
  <text x="1006" y="244" class="label">管理端部署同一路徑</text>
</svg>
