<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-labelledby="title desc">
  <title id="title">公股銀行新手村 primary logo</title>
  <desc id="desc">Primary horizontal logo for 公股銀行新手村, using a teal village and compass mark with a Chinese wordmark.</desc>
  <defs>
    <linearGradient id="mark-bg" x1="30" y1="28" x2="196" y2="212" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17313d"/>
      <stop offset="1" stop-color="#0f4f49"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#10252b" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g transform="translate(24 24)">
    <circle cx="96" cy="96" r="88" fill="url(#mark-bg)" filter="url(#soft-shadow)"/>
    <circle cx="96" cy="96" r="71" fill="#f7faf9"/>
    <path d="M54 74 L96 47 L138 74" fill="none" stroke="#f6c453" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M64 82 H128" stroke="#17313d" stroke-width="8" stroke-linecap="round"/>
    <rect x="54" y="85" width="84" height="52" rx="11" fill="#ffffff" stroke="#17313d" stroke-width="6"/>
    <path d="M70 103 H123" stroke="#a9bbb7" stroke-width="5" stroke-linecap="round"/>
    <path d="M70 119 H105" stroke="#cbd8d5" stroke-width="5" stroke-linecap="round"/>
    <circle cx="124" cy="120" r="8" fill="#e2f3f0" stroke="#0f766e" stroke-width="4"/>
    <path d="M96 74 L116 116 L96 108 L76 116 Z" fill="#0f766e"/>
    <path d="M96 74 L96 108 L76 116 Z" fill="#17313d" opacity="0.92"/>
    <circle cx="96" cy="102" r="7" fill="#f6c453" stroke="#f7faf9" stroke-width="3"/>
    <path d="M66 151 C79 162 113 162 126 151" fill="none" stroke="#f6c453" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g transform="translate(250 57)">
    <text x="0" y="62" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="0" fill="#17313d">公股銀行新手村</text>
    <text x="2" y="112" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="0" fill="#506470">面試題庫・招考行事曆・筆試門檻</text>
    <path d="M4 135 H430" stroke="#e2ece9" stroke-width="6" stroke-linecap="round"/>
    <path d="M4 135 H156" stroke="#f6c453" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
