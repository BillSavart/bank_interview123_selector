<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">公股銀行新手村 分享縮圖</title>
  <desc id="desc">Dark teal share card for 公股銀行新手村 with the village-and-compass mark and the site wordmark.</desc>
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14323c"/>
      <stop offset="0.55" stop-color="#0f4f49"/>
      <stop offset="1" stop-color="#0c3a37"/>
    </linearGradient>
    <filter id="og-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#06181c" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <!-- faint corner accents -->
  <circle cx="1120" cy="92" r="260" fill="#ffffff" opacity="0.03"/>
  <circle cx="120" cy="560" r="200" fill="#f6c453" opacity="0.04"/>

  <!-- logo mark, scaled from the 512 viewBox to 300px, vertically centered -->
  <g transform="translate(120 165) scale(0.586)">
    <circle cx="256" cy="256" r="224" fill="#f7faf9" filter="url(#og-shadow)"/>
    <circle cx="256" cy="256" r="200" fill="#ffffff"/>
    <path d="M150 195 L256 126 L362 195" fill="none" stroke="#0f766e" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M176 214 H336" stroke="#17313d" stroke-width="18" stroke-linecap="round"/>
    <rect x="153" y="220" width="206" height="128" rx="26" fill="#ffffff" stroke="#17313d" stroke-width="14"/>
    <path d="M190 262 H322" stroke="#a9bbb7" stroke-width="13" stroke-linecap="round"/>
    <path d="M190 302 H278" stroke="#cbd8d5" stroke-width="13" stroke-linecap="round"/>
    <circle cx="317" cy="303" r="19" fill="#e2f3f0" stroke="#0f766e" stroke-width="10"/>
    <path d="M256 192 L304 292 L256 271 L208 292 Z" fill="#0f766e"/>
    <path d="M256 192 L256 271 L208 292 Z" fill="#17313d" opacity="0.92"/>
    <circle cx="256" cy="256" r="17" fill="#f6c453" stroke="#ffffff" stroke-width="8"/>
    <path d="M183 381 C214 405 296 405 329 381" fill="none" stroke="#f6c453" stroke-width="18" stroke-linecap="round"/>
    <path d="M217 381 H295" stroke="#17313d" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(470 250)" font-family="'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', 'Hiragino Sans GB', sans-serif">
    <text x="0" y="0" font-size="92" font-weight="800" letter-spacing="2" fill="#ffffff">公股銀行新手村</text>
    <path d="M4 44 H214" stroke="#f6c453" stroke-width="8" stroke-linecap="round"/>
    <text x="4" y="108" font-size="38" font-weight="600" letter-spacing="3" fill="#cfe1dd">面試題庫・招考行事曆・筆試門檻</text>
    <text x="4" y="168" font-size="29" font-weight="500" letter-spacing="2" fill="#8fb3ad">上榜經驗分享，一站式公股銀行招考準備</text>
  </g>

  <text x="470" y="560" font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="26" letter-spacing="1" fill="#6f9690">bank-interview-advisor.com</text>
</svg>
